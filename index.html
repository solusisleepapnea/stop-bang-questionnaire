<!DOCTYPE html>
<html>
<head>
  <title>Solusi Sleep Apnea</title>
</head>
<body>

    height="100%"
    allowfullscreen="true"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none;">

  <script>
    window.onload = function() {
